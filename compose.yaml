services:
  redis:
    image: redis:7-alpine
    container_name: webquills-redis
    command: redis-server --appendonly yes
    volumes:
      - webquills_redis_data:/data
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  webquills_redis_data:
    driver: local
